name: chatapp
description: "A realtime chat application built with Flutter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Networking
  http: ^1.3.0
  socket_io_client: ^3.0.2
  
  # Storage
  shared_preferences: ^2.5.3

  # Routing
  go_router: ^15.1.2

  # DI
  get_it: ^8.0.3

  # Utils
  intl: ^0.20.2
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  emoji_picker_flutter: ^4.3.0
  image_picker: ^1.1.2
  timeago: ^3.7.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
